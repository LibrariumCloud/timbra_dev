    window.onload = function(){
        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);

        var alert_type = urlParams.get("type");
        document.querySelector("#points_name").innerHTML = pictures[alert_type].name;
        document.querySelector("#left_image").src = pictures[alert_type].left_image;
        document.querySelector("#right_image").src = pictures[alert_type].right_image;
        document.querySelector("#points_price").innerHTML = pictures[alert_type].price;
    }
</script>

<meta charset="UTF-8">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap');

    :root{
        --main-panel-color: #100020;
        --sub-panel-color: #6f2fb3;
    }

    *{
        font-family: "Inter", sans-serif;
        font-size: 16px;
    }

    .main-view{
        position: fixed;

        width: 100%;

        display: flex;
        align-items: end;
        justify-content: center;

        animation: fade-in-out 15s ease-in-out forwards;
    }

    .main-panel{
        position: relative;

        color: white;

        z-index: 1000;
    }

    .main-panel>label{
        padding: 18px 80px;

        background: url("https://librariumcloud.github.io/timbra_dev/docs/decors/back.png") center;
        background-size: cover;
        border-radius: 16px;
        box-shadow: inset 0px 0px 5px 5px #5e2997;

        font-size: 20px !important;
        font-weight: 500;

        filter: drop-shadow(0px 0px 2px rgba(0,0,0,0.65));
    }

    .left-image{
        position: absolute;
        top: -20px;
        left: -40px;
        z-index: -2;

        width: 64px;
        transform: rotateZ(-32deg);

        animation: fade-left-anim 15s ease-in-out forwards;
    }

    .right-image{
        position: absolute;
        top: -35px;
        right: -35px;
        z-index: -2;

        width: 64px;
        transform: rotateZ(32deg);

        animation: fade-right-anim 15s ease-in-out forwards;
    }

    .sub{
        position: absolute;

        padding: 5px 15px;

        background: var(--sub-panel-color);
        border-radius: 10px;
        box-shadow: inset 0px 0px 2px 2px rgba(255, 255, 255, 0.2);

        font-weight: 700;
    }

    .name-panel{
        top: -142%;
        left: -16px;
    }

    .price-panel{
        bottom: -142%;
        right: -16px;

        display: flex;
        align-items: center;
        gap: 10px;
    }

    .price-panel>img{
        width: 16px;
    }

    .spark{
        width: 42px;

        position: absolute;
        z-index: 100000;
    }

    @keyframes fade-in-out{
        0%{
            opacity: 0;
            filter: blur(16px);
        }
        5%{
            opacity: 1;
            filter: blur(0px);
        }
        95%{
            opacity: 1;
            filter: blur(0px);
        }
        100%{
            opacity: 0;
            filter: blur(16px);
        }
    }

    @keyframes fade-left-anim{
        0%{
            opacity: 0;
            scale: 0;
            transform: rotateZ(0deg);
            left: -15px;
        }
        10%{
            opacity: 1;
            scale: 1;
            transform: rotateZ(-32deg);
            left: -40px;
        }
        95%{
            opacity: 1;
            scale: 1;
            transform: rotateZ(-32deg);
            left: -40px;
        }
        100%{
            opacity: 0;
            scale: 0;
            transform: rotateZ(0deg);
            left: -15px;
        }
    }

    @keyframes fade-right-anim{
        0%{
            opacity: 0;
            scale: 0;
            transform: rotateZ(0deg);
            right: -15px;
        }
        10%{
            opacity: 1;
            scale: 1;
            transform: rotateZ(32deg);
            right: -35px;
        }
        95%{
            opacity: 1;
            scale: 1;
            transform: rotateZ(32deg);
            right: -35px;
        }
        100%{
            opacity: 0;
            scale: 0;
            transform: rotateZ(0deg);
            right: -15px;
        }
    }

    @keyframes spark-anim{
        0%{
            scale: 0;
            transform: rotateZ(0deg);
        }
        50%{
            scale: 1;
        }
        100%{
            scale: 0;
            transform: rotateZ(360deg);
        }
    }
</style>
<div class="main-view">
    <div class="main-panel">
        <img id="left_image" class="left-image" src="https://librariumcloud.github.io/gamesAPI/Drink_Milkshake.png">
        <img id="right_image" class="right-image" src="https://librariumcloud.github.io/gamesAPI/Drink_Gin.png">
        <label id="points_name">Подтягууууушки</label>
        <div class="name-panel sub">TimbraTV</div>
        <div class="price-panel sub">
            <label id="points_price">x380</label>
            <img src="https://librariumcloud.github.io/timbra_dev/docs/pictures/Milk.png">
        </div>
        <img class="spark" style="width: 48px; top: 20px; left: 10px; animation: spark-anim 5s infinite;" src="https://librariumcloud.github.io/timbra_dev/docs/decors/sparkling.png">
        <img class="spark" style="width: 50px; bottom: 20px; right: 10px; animation: spark-anim 6s infinite;" src="https://librariumcloud.github.io/timbra_dev/docs/decors/sparkling.png">
        <img class="spark" style="width: 32px; top: 35px; right: 57px; animation: spark-anim 4s infinite;" src="https://librariumcloud.github.io/timbra_dev/docs/decors/sparkling.png">
        <img class="spark" style="width: 32px; bottom: 35px; left: 57px; animation: spark-anim 7s infinite;" src="https://librariumcloud.github.io/timbra_dev/docs/decors/sparkling.png">
    </div>
</div>
